<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapNexus - เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/elegant-theme.css">
    <link rel="stylesheet" href="css/smart-city-nexus.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--sc-bg);
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
            padding: 3rem;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.8);
            font-family: var(--font-main);
            transition: all 0.3s;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(26, 54, 93, 0.05);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            background: var(--primary-color);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
            box-shadow: 0 10px 25px rgba(26, 54, 93, 0.15);
        }
    </style>
</head>

<body class="elegant-theme smart-city-theme">
    <div class="elegant-pattern"></div>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fa-solid fa-map-location-dot"></i>
                </div>
                <h2 style="color: var(--text-main); font-size: 2rem; margin-bottom: 0.5rem;">ยินดีต้อนรับกลับมา</h2>
                <p style="color: var(--text-muted);">เข้าสู่ระบบเพื่อสัมผัสเมืองอัจฉริยะนครพนม</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> อีเมล / ชื่อผู้ใช้งาน (Username)</label>
                    <input type="text" class="form-control" placeholder="อีเมล" required>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-lock"></i> รหัสผ่าน</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="elegant-btn primary"
                    style="width: 100%; justify-content: center; margin-top: 1rem; padding: 1rem;">
                    เข้าสู่ระบบ <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>

                <div style="margin-top: 2rem; text-align: center;">
                    <p style="margin: 0; font-size: 0.95rem; color: var(--text-muted); font-weight: 500;">ยังไม่มีบัญชี? <a href="register.html" style="color: var(--sc-secondary); font-weight: 700;">สมัครสมาชิกใหม่</a></p>
                </div>

                <!-- Admin auto-fill helper -->
                <div style="margin-top: 1rem; text-align: center;">
                    <button type="button"
                        onclick="document.querySelector('input[type=\'text\']').value='admin'; document.querySelector('input[type=\'password\']').value='adminMapnexus2026';"
                        style="background:none; border:none; color: var(--text-muted); text-decoration: underline; cursor: pointer; font-family: 'Kanit'; font-size: 0.85rem;">
                        <i class="fa-solid fa-user-shield"></i> คลิกเพื่อกรอกรหัสแอดมินอัตโนมัติ
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/authentication.js"></script>
</body>

</html>
