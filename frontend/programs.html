<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Programs - MapNexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Anuphan:wght@300;400;500;600;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/elegant-theme.css">
    <link rel="stylesheet" href="css/smart-city-nexus.css">
    <style>
        .programs-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        .program-card {
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            position: relative;
        }
        .program-img {
            width: 35%;
            background-color: var(--secondary-color);
            background-size: cover;
            background-position: center;
        }
        .program-info {
            padding: 30px;
            width: 65%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .locked-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .locked-overlay i {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .program-card {
                flex-direction: column;
            }
            .program-img {
                width: 100%;
                height: 200px;
            }
            .program-info {
                width: 100%;
            }
        }
    </style>
</head>
<body class="elegant-theme smart-city-theme">
    <div class="bg-logo-watermark"></div>
    <div class="elegant-pattern"></div>

    <nav class="glass-navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo-container" style="text-decoration: none;">
                    <img src="assets/images/logo.png" alt="MapNexus" style="height: 40px; width: auto; object-fit: contain;">
                    <span class="text-primary" style="font-weight: 700; font-size: 1.3rem; letter-spacing: -0.5px; font-family: var(--font-display);">Map<span class="text-secondary" style="font-weight: 400;">Nexus</span></span>
                </a>
            </div>
            
            <div class="nav-center">
                <ul class="nav-links">
                    <li><a href="index.html"><i class="fa-solid fa-house"></i> หน้าหลัก</a></li>
                    <li><a href="programs.html" class="active"><i class="fa-solid fa-gem"></i> พรีเมียม</a></li>
                    <li><a href="map.html"><i class="fa-solid fa-map"></i> แผนที่ & AI</a></li>
                    <li><a href="index.html#city-monitoring"><i class="fa-solid fa-users-viewfinder"></i> ติดตามกิจกรรม</a></li>
                    <li><a href="profile.html"><i class="fa-solid fa-user"></i> เลเวล</a></li>
                    <li class="mobile-only"><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</a></li>
                </ul>
            </div>

            <div class="nav-right">
                <div class="interaction-pill">
                    <div id="pm25-widget" class="pm-pill loading">
                        <i class="fa-solid fa-wind"></i>
                        <span class="pm-value">--</span>
                        <span class="pm-unit">AQI</span>
                    </div>
                    
                    <div style="width: 1px; height: 20px; background: rgba(0,0,0,0.06);"></div>

                    <div id="user-menu-container" style="display: flex; align-items: center; gap: 8px;">
                        <a href="login.html" class="elegant-btn sm primary" style="padding: 6px 15px; font-size: 0.85rem; border-radius: 50px;">เข้าสู่ระบบ</a>
                    </div>
                </div>
            </div>

            <div class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="programs-container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 class="text-primary" style="font-size: 2.5rem; margin-bottom: 10px;">
                <i class="fa-solid fa-crown text-secondary"></i> Premium Travel Programs
            </h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">
                โปรแกรมท่องเที่ยวแบบ Exclusive สำหรับสมาชิก Premium เท่านั้น
            </p>
        </div>

        <div id="programs-list">
            <!-- Programs will be injected here via JS -->
            <div style="text-align:center; padding: 50px;">
                <i class="fa-solid fa-circle-notch fa-spin fa-2x text-primary"></i> กำลังโหลดข้อมูล...
            </div>
        </div>
    </div>

    <script src="js/pm25.js"></script>
    <script src="js/app.js"></script>
    <script src="js/programs.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
